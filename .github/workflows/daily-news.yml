name: Daily AI News Pipeline

on:
  schedule:
    # Run Mon-Fri at 10:00 UTC (6:00 AM ET)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news pipeline (Smart Mode)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: python -m backend.agents.pipeline --smart

      - name: Upload output as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-output-${{ github.run_id }}
          path: backend/data/final_data/*.json
          retention-days: 30
